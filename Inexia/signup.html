<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Signup Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="container">
          <a href="index.html" class="logo">Company Name</a>
          <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Pricing</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>
          </ul>
          <div class="burger">
            <div class="line1"></div>
            <div class="line2"></div>
            <div class="line3"></div>
          </div>
        </div>
      </nav>
    </header>
    
    <main>
      <div class="signup-section" align = "center">
        <h1>Sign up</h1>
        <form>
          <div class="form-group" align = "center">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your name">
          </div>
          <div class="form-group" align = "center">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="Enter your email address">
          </div>
          <div class="form-group" align = "center">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
          </div>
          <button type="submit" class="signup-btn">Sign up</button>
        </form>
        <div class="or" align = "center">Or sign up with:</div>
        <div class="social-icons" align = "center">
          <a href="#"><img src="https://img.icons8.com/fluent/48/000000/google-logo.png"/></a>
          <a href="#"><img src="https://img.icons8.com/color/48/000000/facebook-new.png"/></a>
        </div>
      </div>
    </main>
    
    <footer>
      <div class="footer">
        <p>&copy; 2023 Company Name. All Rights Reserved.</p>
      </div>
    </footer>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
